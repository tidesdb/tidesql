name: Kubernetes Integration Tests (kind)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  k8s-test:
    runs-on: ubuntu-latest
    name: K8s Primary/Replica/Failover Integration
    timeout-minutes: 30

    steps:
    - name: Checkout TideSQL
      uses: actions/checkout@v4

    - name: Install kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind version

    - name: Create kind cluster
      run: |
        kind create cluster --name tidesql-test --wait 60s
        kubectl cluster-info --context kind-tidesql-test
        kubectl get nodes

    - name: Resolve TidesDB version
      id: tidesdb-version
      run: |
        # Resolve latest TidesDB release tag from GitHub
        TAG=$(curl -sf https://api.github.com/repos/tidesdb/tidesdb/releases/latest | grep '"tag_name"' | head -1 | cut -d'"' -f4)
        if [ -z "$TAG" ]; then
          echo "Failed to resolve latest TidesDB release"
          exit 1
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "TidesDB version: $TAG"

    - name: Build TideSQL Docker image
      run: |
        cd docker
        docker build -f ubuntu/Dockerfile \
          --build-arg MARIADB_VERSION=mariadb-11.8.6 \
          --build-arg TIDESDB_VERSION=${{ steps.tidesdb-version.outputs.tag }} \
          --build-arg WITH_TESTS=0 \
          --build-arg WITH_S3=1 \
          --build-arg DISABLED_ENGINES="ROCKSDB,MROONGA,SPIDER,CONNECT,OQGRAPH,COLUMNSTORE,SPHINX" \
          -t tidesdb/tidesql:test \
          ..
      timeout-minutes: 30

    - name: Load image into kind
      run: kind load docker-image tidesdb/tidesql:test --name tidesql-test

    - name: Deploy MinIO
      run: |
        kubectl create namespace tidesql

        # Deploy MinIO as a simple pod + service
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: Pod
        metadata:
          name: minio
          labels:
            app: minio
        spec:
          containers:
          - name: minio
            image: minio/minio:latest
            command: ["minio", "server", "/data"]
            env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
            ports:
            - containerPort: 9000
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: minio
        spec:
          selector:
            app: minio
          ports:
          - port: 9000
            targetPort: 9000
        EOF

        echo "Waiting for MinIO..."
        kubectl wait -n tidesql --for=condition=Ready pod/minio --timeout=60s

    - name: Create S3 bucket
      run: |
        kubectl exec -n tidesql minio -- \
          sh -c 'mkdir -p /data/tidesql-test'
        echo "Bucket created"

    - name: Deploy TideSQL primary
      run: |
        # Create secret and configmap for MinIO
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: tidesdb-s3-credentials
        type: Opaque
        stringData:
          access-key: "minioadmin"
          secret-key: "minioadmin"
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: tidesdb-primary-config
        data:
          tidesdb.cnf: |
            [mariadb]
            plugin-load-add=ha_tidesdb.so

            tidesdb_object_store_backend=S3
            tidesdb_s3_endpoint=minio.tidesql.svc.cluster.local:9000
            tidesdb_s3_bucket=tidesql-test
            tidesdb_s3_access_key=minioadmin
            tidesdb_s3_secret_key=minioadmin
            tidesdb_s3_use_ssl=OFF
            tidesdb_s3_path_style=ON
            tidesdb_objstore_wal_sync_on_commit=ON

            tidesdb_unified_memtable=ON
            tidesdb_unified_memtable_sync_mode=FULL
            tidesdb_unified_memtable_write_buffer_size=32000000
            tidesdb_block_cache_size=67108864
            tidesdb_flush_threads=2
            tidesdb_compaction_threads=2
            tidesdb_log_level=DEBUG
        ---
        apiVersion: v1
        kind: Pod
        metadata:
          name: tidesql-primary
          labels:
            app: tidesql
            role: primary
        spec:
          containers:
          - name: mariadb
            image: tidesdb/tidesql:test
            command: ["/bin/bash", "-c"]
            args:
            - |
              mkdir -p /etc/mysql/custom && cp /opt/tidesdb-config/tidesdb.cnf /etc/mysql/custom/tidesdb-k8s.cnf && echo "[k8s] TidesDB S3 config injected" || echo "[k8s] WARNING: config copy failed"
              exec /usr/local/bin/tidesql-entrypoint.sh
            ports:
            - containerPort: 3306
            volumeMounts:
            - name: config
              mountPath: /opt/tidesdb-config/tidesdb.cnf
              subPath: tidesdb.cnf
            readinessProbe:
              exec:
                command: ["mariadb-admin", "ping", "-h", "localhost"]
              initialDelaySeconds: 10
              periodSeconds: 5
          volumes:
          - name: config
            configMap:
              name: tidesdb-primary-config
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: tidesql-primary
        spec:
          selector:
            app: tidesql
            role: primary
          ports:
          - port: 3306
            targetPort: 3306
        EOF

        echo "Waiting for primary..."
        kubectl wait -n tidesql --for=condition=Ready pod/tidesql-primary --timeout=120s

    - name: Create monitor user for remote access
      run: |
        # MariaDB root is unix_socket only (localhost). Create a user that
        # the failover controller (a separate pod) can use over TCP.
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "
            CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY 'M0nitor!Pass9';
            GRANT ALL PRIVILEGES ON *.* TO 'monitor'@'%' WITH GRANT OPTION;
            FLUSH PRIVILEGES;
          "
        echo "Monitor user created on primary"

    - name: Verify S3 config is loaded
      run: |
        echo "=== Config file injected into primary ==="
        kubectl exec -n tidesql tidesql-primary -- \
          cat /etc/mysql/custom/tidesdb-k8s.cnf 2>/dev/null || echo "(file missing!)"

        echo ""
        echo "=== S3 system variables ==="
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "SHOW VARIABLES LIKE 'tidesdb_object_store%'; SHOW VARIABLES LIKE 'tidesdb_s3%'; SHOW VARIABLES LIKE 'tidesdb_objstore%'; SHOW VARIABLES LIKE 'tidesdb_replica%';"

        echo ""
        echo "=== TidesDB engine status ==="
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "SHOW ENGINE TIDESDB STATUS\G" | head -30

        echo ""
        echo "=== MariaDB error log (last 20 lines) ==="
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'tail -20 /usr/local/mariadb/log/error.log 2>/dev/null || tail -20 /usr/local/mariadb/data/default/*.err 2>/dev/null' || echo "(no error log found)"

    - name: Write test data to primary
      run: |
        # Write enough data to exceed the 1MB unified memtable write buffer
        # and trigger a flush to SSTables which then get uploaded to S3
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "
            CREATE DATABASE k8s_test;
            USE k8s_test;
            CREATE TABLE items (
              id INT NOT NULL PRIMARY KEY,
              name VARCHAR(100),
              data TEXT
            ) ENGINE=TidesDB;
            INSERT INTO items VALUES (1, 'alpha', REPEAT('A', 10000));
            INSERT INTO items VALUES (2, 'beta',  REPEAT('B', 10000));
            INSERT INTO items VALUES (3, 'gamma', REPEAT('C', 10000));
          "
        # Insert bulk data to exceed the 1MB flush threshold
        for i in $(seq 4 200); do
          kubectl exec -n tidesql tidesql-primary -- \
            mariadb -e "INSERT INTO k8s_test.items VALUES ($i, 'bulk_$i', REPEAT('X', 10000))" 2>/dev/null
        done
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "SELECT COUNT(*) AS total_rows, SUM(LENGTH(data)) AS total_bytes FROM k8s_test.items"

    - name: Verify data on primary
      run: |
        RESULT=$(kubectl exec -n tidesql tidesql-primary -- \
          mariadb -N -e "SELECT COUNT(*) FROM k8s_test.items")
        echo "Primary row count: $RESULT"
        [ "$RESULT" -ge 3 ] || (echo "FAIL: expected at least 3 rows, got $RESULT"; exit 1)

    - name: Force flush to S3
      run: |
        # OPTIMIZE triggers flush + compaction which should push SSTables to S3
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "OPTIMIZE TABLE k8s_test.items" || true

        # Give time for S3 uploads to complete
        sleep 10

        # Verify data actually reached MinIO
        echo "=== MinIO bucket contents ==="
        kubectl exec -n tidesql minio -- \
          ls -lR /data/tidesql-test/ 2>/dev/null | head -30 || true

        echo "=== Primary TidesDB data directory ==="
        kubectl exec -n tidesql tidesql-primary -- \
          ls -lR /usr/local/mariadb/data/tidesdb_data/ 2>/dev/null | head -20 || true

        echo "=== Primary TidesDB LOG (last 30 lines) ==="
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null || cat /usr/local/mariadb/tidesdb_data/LOG 2>/dev/null' | tail -30 || true

    - name: Deploy TideSQL replica
      run: |
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: tidesdb-replica-config
        data:
          tidesdb.cnf: |
            [mariadb]
            plugin-load-add=ha_tidesdb.so

            tidesdb_object_store_backend=S3
            tidesdb_s3_endpoint=minio.tidesql.svc.cluster.local:9000
            tidesdb_s3_bucket=tidesql-test
            tidesdb_s3_access_key=minioadmin
            tidesdb_s3_secret_key=minioadmin
            tidesdb_s3_use_ssl=OFF
            tidesdb_s3_path_style=ON

            tidesdb_replica_mode=ON
            tidesdb_replica_sync_interval=1000000

            tidesdb_unified_memtable=ON
            tidesdb_block_cache_size=67108864
            tidesdb_flush_threads=2
            tidesdb_compaction_threads=2
            tidesdb_log_level=INFO
        ---
        apiVersion: v1
        kind: Pod
        metadata:
          name: tidesql-replica
          labels:
            app: tidesql
            role: replica
        spec:
          containers:
          - name: mariadb
            image: tidesdb/tidesql:test
            command: ["/bin/bash", "-c"]
            args:
            - |
              mkdir -p /etc/mysql/custom && cp /opt/tidesdb-config/tidesdb.cnf /etc/mysql/custom/tidesdb-k8s.cnf && echo "[k8s] TidesDB S3 config injected" || echo "[k8s] WARNING: config copy failed"
              exec /usr/local/bin/tidesql-entrypoint.sh
            ports:
            - containerPort: 3306
            volumeMounts:
            - name: config
              mountPath: /opt/tidesdb-config/tidesdb.cnf
              subPath: tidesdb.cnf
            readinessProbe:
              exec:
                command: ["mariadb-admin", "ping", "-h", "localhost"]
              initialDelaySeconds: 10
              periodSeconds: 5
          volumes:
          - name: config
            configMap:
              name: tidesdb-replica-config
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: tidesql-replica
        spec:
          selector:
            app: tidesql
            role: replica
          ports:
          - port: 3306
            targetPort: 3306
        EOF

        echo "Waiting for replica..."
        kubectl wait -n tidesql --for=condition=Ready pod/tidesql-replica --timeout=120s

        # Create monitor user on replica for failover controller access
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "
            CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY 'M0nitor!Pass9';
            GRANT ALL PRIVILEGES ON *.* TO 'monitor'@'%' WITH GRANT OPTION;
            FLUSH PRIVILEGES;
          "
        echo "Monitor user created on replica"

    - name: Wait for replica sync
      run: |
        echo "Waiting for replica to sync from S3..."
        sleep 20

        # Check if replica can even see databases
        echo "=== Replica databases ==="
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "SHOW DATABASES" 2>/dev/null || true

        echo "=== Replica TidesDB engine status ==="
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "SHOW ENGINE TIDESDB STATUS\G" 2>/dev/null | head -20 || true

        # Retry a few times for sync
        for i in $(seq 1 15); do
          RESULT=$(kubectl exec -n tidesql tidesql-replica -- \
            mariadb -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "0")
          echo "Replica sync check $i: $RESULT rows"
          [ "$RESULT" -ge 3 ] && break
          sleep 5
        done

        if [ "$RESULT" -lt 3 ]; then
          echo "=== Replica TidesDB LOG ==="
          kubectl exec -n tidesql tidesql-replica -- \
            sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null | tail -30' || true
          echo "FAIL: replica did not sync (got $RESULT rows)"
          exit 1
        fi
        echo "Replica synced successfully"

    - name: Verify replica data matches primary
      run: |
        PRIMARY_DATA=$(kubectl exec -n tidesql tidesql-primary -- \
          mariadb -N -e "SELECT id, name FROM k8s_test.items ORDER BY id")
        REPLICA_DATA=$(kubectl exec -n tidesql tidesql-replica -- \
          mariadb -N -e "SELECT id, name FROM k8s_test.items ORDER BY id")

        echo "Primary: $PRIMARY_DATA"
        echo "Replica: $REPLICA_DATA"

        [ "$PRIMARY_DATA" = "$REPLICA_DATA" ] || \
          (echo "FAIL: data mismatch"; exit 1)
        echo "Data matches"

    - name: Verify replica rejects writes
      run: |
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "INSERT INTO k8s_test.items VALUES (99999, 'should_fail', 'x')" 2>&1 \
          | grep -q 'ERROR\|error\|read.only' && echo "PASS: replica correctly rejects writes" \
          || echo "WARNING: replica did not reject write (may not have read-only enforcement)"

    - name: Test manual failover - kill primary and promote
      run: |
        echo "=== Manual failover test ==="
        echo "Killing primary..."
        kubectl delete pod -n tidesql tidesql-primary --grace-period=0 --force
        sleep 5

        echo "Promoting replica manually..."
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "SET GLOBAL tidesdb_promote_primary = ON" 2>&1 || true
        sleep 5

        # Verify promoted replica accepts writes (use id that doesn't conflict)
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "INSERT INTO k8s_test.items VALUES (10001, 'manual_failover', REPEAT('D', 500))" \
          2>&1 || true

        RESULT=$(kubectl exec -n tidesql tidesql-replica -- \
          mariadb -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "0")
        echo "Post-manual-failover row count: $RESULT"
        [ "$RESULT" -ge 3 ] || (echo "FAIL: data lost after manual failover"; exit 1)
        echo "Manual failover successful"

    - name: Restore primary for automated failover test
      run: |
        # The promoted replica is currently acting as primary against the
        # shared MinIO bucket. We must fully drain and remove it BEFORE
        # creating the new tidesql-primary -- otherwise both nodes upload
        # concurrently to the same bucket and race on the schema CF MANIFEST.
        # That race is what caused k8s_test.items to vanish on the new
        # primary in earlier runs (split-brain on the object store).
        echo "=== Draining promoted-replica before restore ==="

        # Flush so any post-promotion writes (the manual_failover INSERT) are
        # in an SSTable, then graceful shutdown so the close path drains the
        # async upload queue. 30s timeout falls through to force-delete.
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "FLUSH LOGS; OPTIMIZE TABLE k8s_test.items;" 2>&1 || true
        kubectl exec -n tidesql tidesql-replica -- \
          timeout 30 mariadb-admin shutdown 2>&1 || true

        kubectl delete pod -n tidesql tidesql-replica --grace-period=0 --force 2>&1 || true
        # Block on the pod being fully removed before bringing up the new
        # primary; condition=Ready alone doesn't give us this guarantee.
        kubectl wait -n tidesql --for=delete pod/tidesql-replica --timeout=60s || true
        echo "Promoted-replica drained and removed"

        # Now safe to attach a new primary to the quiet bucket.
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: Pod
        metadata:
          name: tidesql-primary
          labels:
            app: tidesql
            role: primary
        spec:
          containers:
          - name: mariadb
            image: tidesdb/tidesql:test
            command: ["/bin/bash", "-c"]
            args:
            - |
              mkdir -p /etc/mysql/custom && cp /opt/tidesdb-config/tidesdb.cnf /etc/mysql/custom/tidesdb-k8s.cnf && echo "[k8s] TidesDB S3 config injected" || echo "[k8s] WARNING: config copy failed"
              exec /usr/local/bin/tidesql-entrypoint.sh
            ports:
            - containerPort: 3306
            volumeMounts:
            - name: config
              mountPath: /opt/tidesdb-config/tidesdb.cnf
              subPath: tidesdb.cnf
            readinessProbe:
              exec:
                command: ["mariadb-admin", "ping", "-h", "localhost"]
              initialDelaySeconds: 10
              periodSeconds: 5
          volumes:
          - name: config
            configMap:
              name: tidesdb-primary-config
        EOF

        kubectl wait -n tidesql --for=condition=Ready pod/tidesql-primary --timeout=120s

        # mariadb-admin ping returning OK does NOT mean TidesDB cold-start
        # discovery has finished pulling k8s_test.items from S3. Poll for the
        # table to be visible before treating the new primary as ready.
        echo "Waiting for k8s_test.items to be visible on new primary..."
        VISIBLE=0
        for i in $(seq 1 30); do
          if kubectl exec -n tidesql tidesql-primary -- \
               mariadb -e "SELECT 1 FROM k8s_test.items LIMIT 1" >/dev/null 2>&1; then
            echo "  primary sees k8s_test.items after ${i}s"
            VISIBLE=1
            break
          fi
          sleep 1
        done
        if [ "$VISIBLE" -ne 1 ]; then
          echo "FAIL: new primary never discovered k8s_test.items from S3"
          kubectl exec -n tidesql tidesql-primary -- \
            mariadb -e "SHOW DATABASES" 2>&1 || true
          kubectl exec -n tidesql tidesql-primary -- \
            sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null | tail -80' || true
          exit 1
        fi

        # Create monitor user on new primary
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "
            CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY 'M0nitor!Pass9';
            GRANT ALL PRIVILEGES ON *.* TO 'monitor'@'%' WITH GRANT OPTION;
            FLUSH PRIVILEGES;
          "

        # Bring up a fresh replica against the (now single-writer) bucket.
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: Pod
        metadata:
          name: tidesql-replica
          labels:
            app: tidesql
            role: replica
        spec:
          containers:
          - name: mariadb
            image: tidesdb/tidesql:test
            command: ["/bin/bash", "-c"]
            args:
            - |
              mkdir -p /etc/mysql/custom && cp /opt/tidesdb-config/tidesdb.cnf /etc/mysql/custom/tidesdb-k8s.cnf && echo "[k8s] TidesDB S3 config injected" || echo "[k8s] WARNING: config copy failed"
              exec /usr/local/bin/tidesql-entrypoint.sh
            ports:
            - containerPort: 3306
            volumeMounts:
            - name: config
              mountPath: /opt/tidesdb-config/tidesdb.cnf
              subPath: tidesdb.cnf
            readinessProbe:
              exec:
                command: ["mariadb-admin", "ping", "-h", "localhost"]
              initialDelaySeconds: 10
              periodSeconds: 5
          volumes:
          - name: config
            configMap:
              name: tidesdb-replica-config
        EOF

        kubectl wait -n tidesql --for=condition=Ready pod/tidesql-replica --timeout=120s

        # Create monitor user on fresh replica
        kubectl exec -n tidesql tidesql-replica -- \
          mariadb -e "
            CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY 'M0nitor!Pass9';
            GRANT ALL PRIVILEGES ON *.* TO 'monitor'@'%' WITH GRANT OPTION;
            FLUSH PRIVILEGES;
          "

        # Shared diagnostic block.  Snapshots the world at a labelled
        # checkpoint so failures can be localised to a specific moment
        # rather than a "post-mortem after everything tore down" capture.
        snapshot_state() {
          local label="$1"
          echo ""
          echo "=== SNAPSHOT [$label] @ $(date -u '+%H:%M:%S') ==="
          echo "--- MinIO top-level ---"
          kubectl exec -n tidesql minio -- \
            ls -la /data/tidesql-test/ 2>&1 | head -20 || true
          echo "--- MinIO k8s_test__items ---"
          kubectl exec -n tidesql minio -- \
            ls -la /data/tidesql-test/k8s_test__items/ 2>&1 | head -40 || true
          echo "--- MinIO uwal_*.log presence ---"
          kubectl exec -n tidesql minio -- \
            ls -la /data/tidesql-test/ 2>&1 | grep -E 'uwal_' || echo "(no uwal segments)"
          echo "--- Primary TidesDB LOG (last 12 lines) ---"
          kubectl exec -n tidesql tidesql-primary -- \
            sh -c 'tail -12 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' \
            2>&1 || echo "(primary unreachable)"
          echo "--- Replica TidesDB LOG (last 12 lines) ---"
          kubectl exec -n tidesql tidesql-replica -- \
            sh -c 'tail -12 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' \
            2>&1 || echo "(replica unreachable)"
          echo "--- Counts ---"
          local pc=$(timeout 5 kubectl exec -n tidesql tidesql-primary -- \
            mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "?")
          local rc=$(timeout 5 kubectl exec -n tidesql tidesql-replica -- \
            mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "?")
          echo "primary COUNT(*) = $pc"
          echo "replica COUNT(*) = $rc"
          echo "=== END SNAPSHOT [$label] ==="
          echo ""
        }
        # Expose helper to subsequent steps via /tmp
        declare -f snapshot_state > /tmp/snapshot_state.sh

        snapshot_state "before-new-write"

        # Write fresh data to existing items table.  No OPTIMIZE here --
        # OPTIMIZE forces a synchronous compaction whose new SSTables
        # race with replica MANIFEST sync.  Real failover never has an
        # OPTIMIZE wedged between INSERT and failover; the natural flush
        # path (or a FLUSH LOGS) is enough for the replica to pick up.
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "
            INSERT INTO k8s_test.items VALUES (10002, 'auto_failover_marker', REPEAT('F', 500));
            FLUSH LOGS;
          " 2>&1 || true

        snapshot_state "after-insert-flush-logs"

        # Polled converge-or-fail.  Drops the blind sleep 15 in favour of
        # explicit visibility checks so the log shows the replica's
        # trajectory rather than just the end-state.  Each iteration
        # snapshots a fingerprint (replica count + bucket file count)
        # so we can see whether the system is making progress or stuck.
        echo "=== Waiting for replica to converge on row 10002 ==="
        REPLICA_OK=0
        for i in $(seq 1 60); do
          RC=$(timeout 5 kubectl exec -n tidesql tidesql-replica -- \
                mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" \
                2>/dev/null || echo "0")
          BUCKET_FILES=$(kubectl exec -n tidesql minio -- \
                          sh -c 'ls /data/tidesql-test/k8s_test__items/ 2>/dev/null | wc -l' \
                          2>/dev/null || echo "?")
          UWAL_COUNT=$(kubectl exec -n tidesql minio -- \
                        sh -c 'ls /data/tidesql-test/ 2>/dev/null | grep -c "^uwal_"' \
                        2>/dev/null || echo "?")
          REPLICA_LASTLOG=$(kubectl exec -n tidesql tidesql-replica -- \
                            sh -c 'tail -1 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' \
                            2>&1 | tr -d '\n' | cut -c1-160 || true)
          echo "  iter=${i} replica_count=$RC bucket_items=$BUCKET_FILES uwal_segments=$UWAL_COUNT replica_lastlog=\"$REPLICA_LASTLOG\""
          if [ "$RC" -ge 202 ] 2>/dev/null; then
            echo "  converged at iter=${i} (count=$RC)"
            REPLICA_OK=1
            break
          fi
          sleep 1
        done

        snapshot_state "pre-failover-check"

        if [ "$REPLICA_OK" -ne 1 ]; then
          echo "FAIL: replica never converged to row 10002 within 60s"
          echo "=== Replica TidesDB LOG (last 80 lines) ==="
          kubectl exec -n tidesql tidesql-replica -- \
            sh -c 'tail -80 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' || true
          echo "=== Primary TidesDB LOG (last 80 lines) ==="
          kubectl exec -n tidesql tidesql-primary -- \
            sh -c 'tail -80 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' || true
          echo "=== Full MinIO listing ==="
          kubectl exec -n tidesql minio -- ls -lR /data/tidesql-test/ 2>&1 || true
          exit 1
        fi

        echo "Pre-failover replica row count: $RC"
        echo "Primary restored with test data"

    - name: Deploy automated failover controller
      run: |
        # Deploy the failover controller using the monitor user for TCP access
        kubectl apply -n tidesql -f - <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: tidesdb-failover-script
        data:
          failover.sh: |
            #!/bin/bash
            set -uo pipefail
            PRIMARY_HOST="${PRIMARY_HOST:-tidesql-primary}"
            PRIMARY_PORT="${PRIMARY_PORT:-3306}"
            REPLICA_HOST="${REPLICA_HOST:-tidesql-replica}"
            REPLICA_PORT="${REPLICA_PORT:-3306}"
            CHECK_INTERVAL="${CHECK_INTERVAL:-3}"
            FAILURE_THRESHOLD="${FAILURE_THRESHOLD:-2}"
            MYSQL_USER="${MYSQL_USER:-monitor}"
            MYSQL_PASSWORD="${MYSQL_PASSWORD:-M0nitor!Pass9}"
            FAILURES=0
            log() { echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"; }
            check_primary() {
                mariadb -h "$PRIMARY_HOST" -P "$PRIMARY_PORT" \
                        -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" \
                        -e "SELECT 1" > /dev/null 2>&1
            }
            promote_replica() {
                log "PROMOTING replica $REPLICA_HOST to primary"
                mariadb -h "$REPLICA_HOST" -P "$REPLICA_PORT" \
                        -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" \
                        -e "SET GLOBAL tidesdb_promote_primary = ON" 2>&1
                log "Promotion command sent"
            }
            log "TidesQL Failover Controller started"
            log "Primary: $PRIMARY_HOST:$PRIMARY_PORT"
            log "Replica: $REPLICA_HOST:$REPLICA_PORT"
            log "Check interval: ${CHECK_INTERVAL}s, threshold: $FAILURE_THRESHOLD"
            while true; do
                if check_primary; then
                    [ "$FAILURES" -gt 0 ] && log "Primary recovered after $FAILURES failures"
                    FAILURES=0
                else
                    FAILURES=$((FAILURES + 1))
                    log "Primary check failed ($FAILURES/$FAILURE_THRESHOLD)"
                    if [ "$FAILURES" -ge "$FAILURE_THRESHOLD" ]; then
                        promote_replica
                        log "Failover complete. Exiting."
                        exit 0
                    fi
                fi
                sleep "$CHECK_INTERVAL"
            done
        ---
        apiVersion: v1
        kind: Pod
        metadata:
          name: tidesql-failover
          labels:
            app: tidesql-failover
        spec:
          restartPolicy: Never
          containers:
          - name: controller
            image: mariadb:latest
            command: ["bash", "/scripts/failover.sh"]
            env:
            - name: PRIMARY_HOST
              value: "tidesql-primary"
            - name: REPLICA_HOST
              value: "tidesql-replica"
            - name: CHECK_INTERVAL
              value: "3"
            - name: FAILURE_THRESHOLD
              value: "2"
            - name: MYSQL_USER
              value: "monitor"
            - name: MYSQL_PASSWORD
              value: "M0nitor!Pass9"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: scripts
            configMap:
              name: tidesdb-failover-script
              defaultMode: 0755
        EOF

        kubectl wait -n tidesql --for=condition=Ready pod/tidesql-failover --timeout=60s
        echo "Failover controller deployed"

        # Verify it's running and can reach the primary
        sleep 5
        kubectl logs -n tidesql tidesql-failover --tail=5

    - name: Snapshot primary logs before auto-failover kill
      run: |
        # The auto-failover step force-deletes tidesql-primary, after which
        # `kubectl logs/exec` on that pod returns NotFound and the post-
        # mortem dump cannot tell us what the primary was doing. Capture
        # everything we'd want from it BEFORE the kill.
        mkdir -p /tmp/k8s-logs/pre-autofail
        kubectl logs -n tidesql tidesql-primary \
          > /tmp/k8s-logs/pre-autofail/primary-stdout.log 2>&1 || true
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' \
          > /tmp/k8s-logs/pre-autofail/primary-tidesdb.log 2>&1 || true
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'tail -200 /usr/local/mariadb/log/error.log 2>/dev/null \
                 || tail -200 /usr/local/mariadb/data/default/*.err 2>/dev/null' \
          > /tmp/k8s-logs/pre-autofail/primary-mariadb.log 2>&1 || true
        kubectl exec -n tidesql tidesql-primary -- \
          mariadb -e "SHOW DATABASES; SHOW TABLES IN k8s_test; SELECT COUNT(*) FROM k8s_test.items;" \
          > /tmp/k8s-logs/pre-autofail/primary-state.txt 2>&1 || true
        echo "Captured pre-autofail primary logs to /tmp/k8s-logs/pre-autofail/"
        ls -la /tmp/k8s-logs/pre-autofail/

    - name: Test automated failover - kill primary
      run: |
        # Pull in the snapshot helper from the prior step (saved by the
        # restore step).  Defines snapshot_state again in this shell.
        if [ -r /tmp/snapshot_state.sh ]; then
          source /tmp/snapshot_state.sh 2>/dev/null || true
        fi
        snapshot_state() {
          local label="$1"
          echo ""
          echo "=== SNAPSHOT [$label] @ $(date -u '+%H:%M:%S') ==="
          kubectl exec -n tidesql minio -- \
            ls -la /data/tidesql-test/ 2>&1 | head -20 || true
          kubectl exec -n tidesql minio -- \
            sh -c 'ls -la /data/tidesql-test/k8s_test__items/ 2>/dev/null' | head -40 || true
          local rc=$(timeout 5 kubectl exec -n tidesql tidesql-replica -- \
            mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "?")
          echo "replica COUNT(*) = $rc"
          kubectl exec -n tidesql tidesql-replica -- \
            sh -c 'tail -12 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' \
            2>&1 || true
          echo "=== END SNAPSHOT [$label] ==="
        }

        echo "=== Automated failover test ==="
        snapshot_state "before-kill"

        echo "Killing primary to trigger automatic failover..."
        kubectl delete pod -n tidesql tidesql-primary --grace-period=0 --force

        # The failover controller checks every 3s with threshold=2
        # So it should detect and promote within ~10s
        echo "Waiting for failover controller to detect and promote..."

        # Wait for the controller to finish (it exits after promotion).
        # While waiting, snapshot the replica + MinIO every few iterations
        # so we can see whether the replica is making catch-up progress
        # during the dead-primary window.
        for i in $(seq 1 20); do
          STATUS=$(kubectl get pod -n tidesql tidesql-failover -o jsonpath='{.status.phase}' 2>/dev/null || echo "unknown")
          echo "  check $i: controller status=$STATUS"
          if [ "$STATUS" = "Succeeded" ]; then
            echo "Failover controller completed promotion"
            break
          fi
          # Sample replica state on a few iterations so we can correlate
          # what the replica saw against when the controller decided.
          if [ $((i % 3)) -eq 1 ]; then
            RC=$(timeout 3 kubectl exec -n tidesql tidesql-replica -- \
              mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "?")
            REPL_LAST=$(kubectl exec -n tidesql tidesql-replica -- \
              sh -c 'tail -1 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' 2>&1 \
              | tr -d '\n' | cut -c1-160 || true)
            echo "    [wait-iter=${i}] replica_count=$RC replica_lastlog=\"$REPL_LAST\""
          fi
          sleep 3
        done

        snapshot_state "after-controller-completes"

        # Show controller logs
        echo "=== Failover controller logs ==="
        kubectl logs -n tidesql tidesql-failover 2>/dev/null || true

    - name: Verify automated failover succeeded
      timeout-minutes: 2
      run: |
        # The replica should now be promoted and accept writes.  Instead
        # of a blind sleep 5, poll for the count to land for up to 30s so
        # the log shows whether the data was visible immediately after
        # promotion or only after the engine finished its post-promotion
        # MANIFEST replay + WAL replay pass.
        echo "=== Post-promotion convergence trajectory ==="
        POST_OK=0
        for i in $(seq 1 30); do
          RESULT=$(timeout 5 kubectl exec -n tidesql tidesql-replica -- \
            mariadb --connect-timeout=3 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "0")
          PROMOTED_LASTLOG=$(kubectl exec -n tidesql tidesql-replica -- \
            sh -c 'tail -1 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' 2>&1 \
            | tr -d '\n' | cut -c1-160 || true)
          echo "  iter=${i} count=$RESULT lastlog=\"$PROMOTED_LASTLOG\""
          if [ "$RESULT" -ge 202 ] 2>/dev/null; then
            POST_OK=1
            break
          fi
          sleep 1
        done

        echo ""
        echo "=== Final MinIO state after auto-failover ==="
        kubectl exec -n tidesql minio -- \
          ls -la /data/tidesql-test/ 2>&1 || true
        kubectl exec -n tidesql minio -- \
          sh -c 'ls -la /data/tidesql-test/k8s_test__items/ 2>/dev/null' || true

        echo ""
        echo "=== Promoted-replica TidesDB LOG (last 100 lines) ==="
        kubectl exec -n tidesql tidesql-replica -- \
          sh -c 'tail -100 /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null' || true

        echo "Post-auto-failover row count: $RESULT"
        if [ "$POST_OK" -ne 1 ]; then
          echo "FAIL: data lost after automated failover (got $RESULT)"
          exit 1
        fi

        # Verify promoted replica accepts writes
        timeout 15 kubectl exec -n tidesql tidesql-replica -- \
          mariadb --connect-timeout=5 -e "INSERT INTO k8s_test.items VALUES (10003, 'after_auto_failover', REPEAT('G', 500))" \
          2>&1 || echo "INSERT failed or timed out (non-fatal)"

        NEW_RESULT=$(timeout 10 kubectl exec -n tidesql tidesql-replica -- \
          mariadb --connect-timeout=5 -N -e "SELECT COUNT(*) FROM k8s_test.items" 2>/dev/null || echo "0")
        echo "After write: $NEW_RESULT rows"

        echo "Automated failover successful - data intact, writes accepted"

    - name: Collect logs on failure
      if: failure()
      run: |
        # Logs we captured before auto-failover deleted tidesql-primary.
        # Without these the post-mortem is blind for the auto-failover scenario.
        if [ -d /tmp/k8s-logs/pre-autofail ]; then
          echo "=== Pre-auto-failover primary state (captured before pod delete) ==="
          for f in /tmp/k8s-logs/pre-autofail/*; do
            echo "--- $f ---"
            tail -120 "$f" 2>/dev/null || echo "(empty)"
            echo ""
          done
        fi
        echo "=== Primary container logs ==="
        kubectl logs -n tidesql tidesql-primary 2>/dev/null | tail -50 || echo "(none)"
        echo ""
        echo "=== Primary MariaDB error log ==="
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'tail -40 /usr/local/mariadb/log/error.log 2>/dev/null || tail -40 /usr/local/mariadb/data/default/*.err 2>/dev/null' || echo "(none)"
        echo ""
        echo "=== Primary TidesDB LOG ==="
        kubectl exec -n tidesql tidesql-primary -- \
          sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null || cat /usr/local/mariadb/tidesdb_data/LOG 2>/dev/null' | tail -40 || echo "(none)"
        echo ""
        echo "=== Primary config ==="
        kubectl exec -n tidesql tidesql-primary -- \
          cat /etc/mysql/custom/tidesdb-k8s.cnf 2>/dev/null || echo "(missing)"
        echo ""
        echo "=== Replica container logs ==="
        kubectl logs -n tidesql tidesql-replica 2>/dev/null | tail -50 || echo "(none)"
        echo ""
        echo "=== Replica MariaDB error log ==="
        kubectl exec -n tidesql tidesql-replica -- \
          sh -c 'tail -40 /usr/local/mariadb/log/error.log 2>/dev/null || tail -40 /usr/local/mariadb/data/default/*.err 2>/dev/null' || echo "(none)"
        echo ""
        echo "=== Replica TidesDB LOG ==="
        kubectl exec -n tidesql tidesql-replica -- \
          sh -c 'cat /usr/local/mariadb/data/tidesdb_data/LOG 2>/dev/null || cat /usr/local/mariadb/tidesdb_data/LOG 2>/dev/null' | tail -40 || echo "(none)"
        echo ""
        echo "=== MinIO bucket ==="
        kubectl exec -n tidesql minio -- ls -lR /data/tidesql-test/ 2>/dev/null | head -30 || echo "(empty or error)"
        echo ""
        echo "=== Failover controller logs ==="
        kubectl logs -n tidesql tidesql-failover 2>/dev/null | tail -20 || echo "(none)"
        echo ""
        echo "=== MinIO logs ==="
        kubectl logs -n tidesql minio 2>/dev/null | tail -20 || echo "(none)"
        echo ""
        echo "=== Pod status ==="
        kubectl get pods -n tidesql -o wide 2>/dev/null || true
        echo ""
        echo "=== Events ==="
        kubectl get events -n tidesql --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || true

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name tidesql-test || true
