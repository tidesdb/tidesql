name: Object Store Tests (MinIO)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  objstore-test:
    runs-on: ubuntu-latest
    name: TidesDB Object Store Integration (MinIO)

    steps:
    - name: Checkout TideSQL
      uses: actions/checkout@v4
      with:
        path: tidesql

    - name: Start MinIO
      run: |
        docker run -d --name minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          minio/minio:latest server /data
        for i in $(seq 1 30); do
          curl -sf http://localhost:9000/minio/health/live && break
          echo "waiting for minio ($i)..."
          sleep 2
        done

    - name: Create test bucket
      run: |
        curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
        chmod +x /tmp/mc
        /tmp/mc alias set local http://localhost:9000 minioadmin minioadmin
        /tmp/mc mb local/tidesql-test || true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git \
          libncurses5-dev libssl-dev libxml2-dev zlib1g-dev \
          libevent-dev libcurl4-openssl-dev liblz4-dev \
          libzstd-dev libsnappy-dev bison gnutls-dev \
          libpcre2-dev ccache

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-objstore-${{ github.sha }}
        restore-keys: ccache-objstore-

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --set-config=compression=true
        ccache -z

    - name: Install TidesDB library with S3 support
      run: |
        git clone --depth 1 https://github.com/tidesdb/tidesdb.git tidesdb-lib
        cd tidesdb-lib
        echo "TidesDB commit: $(git rev-parse HEAD)"
        mkdir build && cd build
        cmake .. -DTIDESDB_WITH_S3=ON
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Clone MariaDB server
      run: |
        git clone --depth 1 --branch mariadb-11.8.6 \
          https://github.com/MariaDB/server.git mariadb-server
        cd mariadb-server
        git submodule update --init --recursive --depth 1

    - name: Copy TidesDB storage engine to MariaDB
      run: |
        cp -r tidesql/tidesdb mariadb-server/storage/
        cp -r tidesql/mysql-test/suite/tidesdb mariadb-server/mysql-test/suite/

    - name: Build MariaDB with TidesDB plugin
      working-directory: mariadb-server
      run: |
        mkdir -p build && cd build
        cmake .. \
          -G Ninja \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DPLUGIN_TIDESDB=DYNAMIC \
          -DTIDESDB_WITH_S3=ON \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DPLUGIN_ROCKSDB=NO \
          -DPLUGIN_MROONGA=NO \
          -DPLUGIN_SPIDER=NO \
          -DPLUGIN_COLUMNSTORE=NO \
          -DPLUGIN_CONNECT=NO \
          -DPLUGIN_OQGRAPH=NO \
          -DPLUGIN_ARCHIVE=NO \
          -DWITH_UNIT_TESTS=OFF \
          -DCONC_WITH_UNITTEST=OFF \
          -DWITH_MARIABACKUP=OFF \
          -DWITH_EMBEDDED_SERVER=OFF
        ninja -j$(nproc)
        ccache -s

    - name: Run object store MTR test
      working-directory: mariadb-server/build
      run: |
        ./mysql-test/mtr \
          --suite=tidesdb \
          tidesdb.tidesdb_object_store \
          --mysqld=--tidesdb_object_store_backend=S3 \
          --mysqld=--tidesdb_s3_endpoint=localhost:9000 \
          --mysqld=--tidesdb_s3_bucket=tidesql-test \
          --mysqld=--tidesdb_s3_access_key=minioadmin \
          --mysqld=--tidesdb_s3_secret_key=minioadmin \
          --mysqld=--tidesdb_s3_use_ssl=OFF \
          --mysqld=--tidesdb_s3_path_style=ON \
          --force --retry=1

    - name: Run standard test suite (local mode)
      working-directory: mariadb-server/build
      run: |
        ./mysql-test/mtr --suite=tidesdb --parallel=4 --force --retry=1

    - name: Verify bucket has data
      if: always()
      run: |
        echo "Objects in tidesql-test bucket:"
        /tmp/mc ls --recursive local/tidesql-test/ | head -20 || true
        echo "Total objects:"
        /tmp/mc ls --recursive local/tidesql-test/ | wc -l || true

    - name: Stop MinIO
      if: always()
      run: docker rm -f minio || true
